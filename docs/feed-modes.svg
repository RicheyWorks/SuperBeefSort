<text x="429" y="290" font-size="14" fill="#9aa7b6">rotations</text>
<text x="399" y="314" font-size="11.5" fill="#7e8b9a" font-family="monospace">build cost: O(n log n), median-first</text>
<text x="399" y="358" font-size="12" font-weight="600" fill="#cdd6e0" font-family="monospace">BalancedBuildFeeder:</text>
<text x="399" y="378" font-size="11.5" fill="#9aa7b6">insert each subrange median first — fewer rotations</text>
