<text x="902" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#06140e" font-family="monospace">built together</text>
<text x="752" y="290" font-size="46" font-weight="800" fill="#1d9e75" font-family="monospace">0</text>
<text x="782" y="290" font-size="14" fill="#9aa7b6">rotations</text>
<text x="752" y="314" font-size="11.5" fill="#7e8b9a" font-family="monospace">build cost: O(n) direct build</text>
<text x="752" y="358" font-size="12" font-weight="600" fill="#cdd6e0" font-family="monospace">BulkBuildFeeder:</text>
<text x="752" y="378" font-size="11.5" fill="#9aa7b6">CSRBT buildBalanced — 0 rotations, 0 compares</text>
<text x="30" y="462" font-size="11" fill="#6b7787">Rotations scale with n — 9 / 5 / 0 at n=15;  23 / 14 / 0 at n=31.   SBS sorts first, so it can feed in the cheapest order — a feeder, not just a sorter.   (ARCHITECTURE §6.2)</text>
