<text x="30" y="42" font-size="21" font-weight="700" fill="#e6edf3">Feeding a sorted run into CSRBT — why the order matters</text>
<text x="30" y="64" font-size="12.5" fill="#5a6675">All three build the identical ordered set; the work to get there is what differs.  (n = 15 distinct keys, sorted)</text>
<text x="30" y="96" font-size="11" fill="#8b98a8">insertion order:</text>
