<text x="60" y="146" font-size="15" font-weight="700" fill="#e5534b" font-family="monospace">FeedMode.DIRECT</text>
<text x="46" y="186" font-size="10.5" letter-spacing="1" fill="#8b98a8">FEED ORDER OVER THE SORTED RUN</text>
